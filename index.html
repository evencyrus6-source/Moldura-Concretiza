<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b7f73">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Moldura Casa">
  <link rel="manifest" href="manifest.webmanifest">
  <title>Moldura Casa</title>
  <style>
    :root {
      --bg: #f7f4ee;
      --ink: #17191c;
      --muted: #66707a;
      --line: #dfe3e8;
      --panel: #ffffff;
      --green: #0b7f73;
      --orange: #e2552e;
      --gold: #d9b36a;
      --dark: #102126;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    button, input {
      font: inherit;
    }

    button {
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      box-shadow: inset 0 0 0 1px var(--line);
      font-weight: 700;
      padding: 0 12px;
    }

    .primary {
      background: var(--green);
      color: #fff;
      box-shadow: none;
    }

    .app {
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: max(14px, env(safe-area-inset-top)) 14px 10px;
      background: rgba(247, 244, 238, .96);
      border-bottom: 1px solid rgba(0,0,0,.08);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 1.1rem;
    }

    .counter {
      color: var(--muted);
      font-size: .86rem;
      white-space: nowrap;
    }

    main {
      padding: 14px 14px 126px;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 12px;
    }

    .stage-wrap {
      display: grid;
      place-items: center;
      min-height: min(62dvh, 560px);
    }

    .frame {
      width: min(100%, 520px);
      aspect-ratio: 4 / 5;
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      background: #f9f7f2;
      box-shadow: 0 18px 45px rgba(20,24,31,.16);
    }

    .photo-box {
      position: absolute;
      left: 8%;
      top: 6.4%;
      width: 84%;
      height: 74%;
      overflow: hidden;
      background: #eef1f4;
      border: 4px solid #0b7f73;
    }

    #photoPreview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform-origin: center;
      display: none;
      touch-action: none;
      user-select: none;
    }

    #customFramePreview {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      display: none;
      pointer-events: none;
      z-index: 4;
    }

    .empty {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 24px;
      z-index: 1;
    }

    .empty b {
      display: block;
      color: var(--ink);
      margin-bottom: 6px;
      font-size: 1.08rem;
    }

    .caption {
      position: absolute;
      left: 8%;
      bottom: 5.2%;
      width: 84%;
      height: 9%;
      background: #ffffff;
      display: grid;
      place-items: center;
      text-align: center;
      color: #222831;
      padding: 6px;
      z-index: 2;
    }

    .caption strong {
      display: block;
      font-size: clamp(.9rem, 4vw, 1.55rem);
      line-height: 1.05;
    }

    .caption span {
      color: var(--muted);
      font-size: clamp(.68rem, 2.8vw, .95rem);
    }

    .style-dark { background: var(--dark); }
    .style-dark .photo-box { border-color: var(--gold); }
    .style-dark .caption { background: #122a30; color: #fff; }
    .style-dark .caption span { color: #f5eee3; }

    .style-premium { background: #e9dfd0; }
    .style-premium .photo-box { border-color: #a56d38; }
    .style-premium .caption { background: #fffaf2; color: #3b3029; }

    .style-sale { background: var(--green); }
    .style-sale .photo-box { border-color: #f6d45e; }
    .style-sale .caption { background: var(--orange); color: #fff; }
    .style-sale .caption span { color: #fff; }

    .strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 2px 8px;
    }

    .thumb {
      flex: 0 0 58px;
      height: 72px;
      border: 2px solid transparent;
      overflow: hidden;
      padding: 0;
    }

    .thumb.active {
      border-color: var(--green);
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
      background: rgba(255,255,255,.96);
      border-top: 1px solid rgba(0,0,0,.1);
      padding: 10px 12px max(12px, env(safe-area-inset-bottom));
      display: grid;
      gap: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .row.two {
      grid-template-columns: 1fr 1fr;
    }

    .panel {
      display: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
      gap: 10px;
    }

    .panel.open {
      display: grid;
    }

    label {
      font-size: .82rem;
      font-weight: 700;
      color: #30343a;
    }

    .control {
      display: grid;
      gap: 6px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--green);
    }

    .swatches {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .swatch {
      min-height: 48px;
      padding: 0 6px;
      font-size: .82rem;
      color: #17191c;
    }

    .swatch.active {
      box-shadow: inset 0 0 0 3px var(--green);
    }

    .s-clean { background: #f9f7f2; }
    .s-dark { background: var(--dark); color: #fff; }
    .s-premium { background: #e9dfd0; }
    .s-sale { background: var(--green); color: #fff; }

    .hidden {
      display: none;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 178px;
      transform: translateX(-50%) translateY(14px);
      background: rgba(23,25,28,.92);
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      opacity: 0;
      pointer-events: none;
      transition: .2s ease;
      z-index: 20;
      max-width: 88vw;
      text-align: center;
      font-size: .9rem;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="top">
        <h1>Moldura Casa</h1>
        <div class="counter" id="counter">0 fotos</div>
      </div>
    </header>

    <main>
      <section class="stage-wrap">
        <div class="frame" id="frame">
          <div class="photo-box">
            <img id="photoPreview" alt="Foto selecionada">
            <div class="empty" id="empty">
              <div><b>Escolha uma foto</b><span>A imagem aparece aqui antes de baixar.</span></div>
            </div>
          </div>
          <img id="customFramePreview" alt="Moldura personalizada">
          <div class="caption">
            <div><strong>IMOVEL EM DESTAQUE</strong><span>Foto pronta para anuncio</span></div>
          </div>
        </div>
      </section>
      <section class="strip" id="strip"></section>
    </main>

    <section class="bar">
      <div class="row">
        <button class="primary" id="pickBtn">Fotos</button>
        <button id="frameBtn">Moldura</button>
        <button id="adjustBtn">Ajustar</button>
        <button id="resetBtn">Reset</button>
      </div>

      <div class="panel" id="framePanel">
        <label>Moldura</label>
        <div class="swatches">
          <button class="swatch s-clean active" data-style="clean">Clara</button>
          <button class="swatch s-dark" data-style="dark">Escura</button>
          <button class="swatch s-premium" data-style="premium">Premium</button>
          <button class="swatch s-sale" data-style="sale">Venda</button>
        </div>
        <div class="row two">
          <button id="customFrameBtn">Minha moldura</button>
          <button id="clearFrameBtn">Limpar moldura</button>
        </div>
      </div>

      <div class="panel" id="adjustPanel">
        <div class="control">
          <label>Zoom</label>
          <input id="zoom" type="range" min="80" max="180" value="100">
        </div>
        <div class="row">
          <button id="leftBtn">&lt;</button>
          <button id="upBtn">Subir</button>
          <button id="downBtn">Descer</button>
          <button id="rightBtn">&gt;</button>
        </div>
      </div>

      <div class="row two">
        <button id="downloadBtn">Baixar foto</button>
        <button class="primary" id="downloadAllBtn">Baixar todas</button>
      </div>
    </section>
  </div>

  <input id="photoInput" class="hidden" type="file" accept="image/jpeg,image/png,image/webp,image/*" multiple>
  <input id="frameInput" class="hidden" type="file" accept="image/png,image/webp,image/jpeg,image/*">
  <div class="toast" id="toast"></div>

  <script>
    const frame = document.getElementById('frame');
    const photoPreview = document.getElementById('photoPreview');
    const customFramePreview = document.getElementById('customFramePreview');
    const empty = document.getElementById('empty');
    const strip = document.getElementById('strip');
    const counter = document.getElementById('counter');
    const photoInput = document.getElementById('photoInput');
    const frameInput = document.getElementById('frameInput');
    const toastEl = document.getElementById('toast');

    const state = {
      photos: [],
      selected: -1,
      style: 'clean',
      customFrameUrl: '',
      customFrameImage: null,
      zoom: 1,
      x: 0,
      y: 0
    };

    const styleMap = {
      clean: { bg: '#f9f7f2', border: '#0b7f73', capBg: '#ffffff', capText: '#222831', capSub: '#66707a' },
      dark: { bg: '#102126', border: '#d9b36a', capBg: '#122a30', capText: '#ffffff', capSub: '#f5eee3' },
      premium: { bg: '#e9dfd0', border: '#a56d38', capBg: '#fffaf2', capText: '#3b3029', capSub: '#66707a' },
      sale: { bg: '#0b7f73', border: '#f6d45e', capBg: '#e2552e', capText: '#ffffff', capSub: '#ffffff' }
    };

    function toast(text) {
      toastEl.textContent = text;
      toastEl.classList.add('show');
      clearTimeout(toastEl.timer);
      toastEl.timer = setTimeout(() => toastEl.classList.remove('show'), 2300);
    }

    function current() {
      return state.photos[state.selected];
    }

    function updatePreview() {
      const item = current();
      counter.textContent = state.photos.length === 1 ? '1 foto' : `${state.photos.length} fotos`;
      frame.className = `frame style-${state.style}`;

      if (!item) {
        photoPreview.style.display = 'none';
        empty.style.display = 'grid';
        return;
      }

      photoPreview.src = item.url;
      photoPreview.style.display = 'block';
      empty.style.display = 'none';
      photoPreview.style.transform = `translate(${item.x}px, ${item.y}px) scale(${item.zoom})`;
      customFramePreview.src = state.customFrameUrl || '';
      customFramePreview.style.display = state.customFrameUrl ? 'block' : 'none';
    }

    function rebuildStrip() {
      strip.innerHTML = '';
      state.photos.forEach((item, index) => {
        const button = document.createElement('button');
        button.className = `thumb ${index === state.selected ? 'active' : ''}`;
        const img = document.createElement('img');
        img.src = item.url;
        img.alt = `Foto ${index + 1}`;
        button.appendChild(img);
        button.addEventListener('click', () => {
          state.selected = index;
          rebuildStrip();
          updatePreview();
        });
        strip.appendChild(button);
      });
    }

    function openImage(url) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = url;
      });
    }

    async function addPhotos(files) {
      const imageFiles = [...files].filter(file => file.type.startsWith('image/'));
      if (!imageFiles.length) return toast('Use uma foto da camera ou salva no aparelho.');

      const firstNew = state.photos.length;
      for (const file of imageFiles) {
        const url = URL.createObjectURL(file);
        try {
          await openImage(url);
          state.photos.push({
            name: file.name.replace(/\.[^.]+$/, '') || 'foto',
            url,
            zoom: 1,
            x: 0,
            y: 0
          });
        } catch {
          URL.revokeObjectURL(url);
          toast('Uma foto nao abriu. Tire pela camera ou baixe/salve no aparelho.');
        }
      }

      if (state.photos.length > firstNew) {
        state.selected = firstNew;
        rebuildStrip();
        updatePreview();
        toast('Foto aberta na moldura');
      }
      photoInput.value = '';
    }

    function move(dx, dy) {
      const item = current();
      if (!item) return;
      item.x += dx;
      item.y += dy;
      updatePreview();
    }

    function resetCurrent() {
      const item = current();
      if (!item) return;
      item.zoom = 1;
      item.x = 0;
      item.y = 0;
      document.getElementById('zoom').value = 100;
      updatePreview();
    }

    function drawImageCover(ctx, img, x, y, w, h, zoom, ox, oy) {
      const scale = Math.max(w / img.naturalWidth, h / img.naturalHeight) * zoom;
      const dw = img.naturalWidth * scale;
      const dh = img.naturalHeight * scale;
      ctx.drawImage(img, x + (w - dw) / 2 + ox, y + (h - dh) / 2 + oy, dw, dh);
    }

    async function makeFinal(item) {
      const img = await openImage(item.url);
      const canvas = document.createElement('canvas');
      canvas.width = 1200;
      canvas.height = 1500;
      const ctx = canvas.getContext('2d');
      const s = styleMap[state.style];

      ctx.fillStyle = s.bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const box = { x: 96, y: 96, w: 1008, h: 1110 };
      ctx.save();
      ctx.beginPath();
      ctx.rect(box.x, box.y, box.w, box.h);
      ctx.clip();
      ctx.fillStyle = '#eef1f4';
      ctx.fillRect(box.x, box.y, box.w, box.h);
      drawImageCover(ctx, img, box.x, box.y, box.w, box.h, item.zoom, item.x * 3, item.y * 3);
      ctx.restore();

      if (state.customFrameImage) {
        ctx.drawImage(state.customFrameImage, 0, 0, canvas.width, canvas.height);
      } else {
        ctx.strokeStyle = s.border;
        ctx.lineWidth = 16;
        ctx.strokeRect(box.x, box.y, box.w, box.h);

        ctx.fillStyle = s.capBg;
        ctx.fillRect(96, 1290, 1008, 120);
        ctx.fillStyle = s.capText;
        ctx.textAlign = 'center';
        ctx.font = '700 52px Arial';
        ctx.fillText('IMOVEL EM DESTAQUE', 600, 1348);
        ctx.fillStyle = s.capSub;
        ctx.font = '400 30px Arial';
        ctx.fillText('Foto pronta para anuncio', 600, 1392);
      }

      return canvas.toDataURL('image/jpeg', .94);
    }

    async function downloadItem(item, index) {
      const url = await makeFinal(item);
      const link = document.createElement('a');
      link.href = url;
      link.download = `${item.name}-com-moldura-${index + 1}.jpg`;
      link.click();
    }

    document.getElementById('pickBtn').addEventListener('click', () => photoInput.click());
    photoInput.addEventListener('change', event => addPhotos(event.target.files));
    document.getElementById('customFrameBtn').addEventListener('click', () => frameInput.click());
    document.getElementById('clearFrameBtn').addEventListener('click', () => {
      if (state.customFrameUrl) URL.revokeObjectURL(state.customFrameUrl);
      state.customFrameUrl = '';
      state.customFrameImage = null;
      customFramePreview.style.display = 'none';
      updatePreview();
      toast('Moldura personalizada removida');
    });

    frameInput.addEventListener('change', async event => {
      const file = event.target.files[0];
      if (!file || !file.type.startsWith('image/')) return toast('Escolha uma imagem de moldura.');
      if (state.customFrameUrl) URL.revokeObjectURL(state.customFrameUrl);
      const url = URL.createObjectURL(file);
      try {
        state.customFrameImage = await openImage(url);
        state.customFrameUrl = url;
        updatePreview();
        toast('Sua moldura foi selecionada');
      } catch {
        URL.revokeObjectURL(url);
        toast('Essa moldura não abriu. Use PNG ou JPG.');
      }
      frameInput.value = '';
    });

    document.getElementById('frameBtn').addEventListener('click', () => {
      document.getElementById('framePanel').classList.toggle('open');
      document.getElementById('adjustPanel').classList.remove('open');
    });

    document.getElementById('adjustBtn').addEventListener('click', () => {
      document.getElementById('adjustPanel').classList.toggle('open');
      document.getElementById('framePanel').classList.remove('open');
    });

    document.querySelectorAll('.swatch').forEach(button => {
      button.addEventListener('click', () => {
        state.style = button.dataset.style;
        document.querySelectorAll('.swatch').forEach(item => item.classList.toggle('active', item === button));
        updatePreview();
        toast(`Moldura ${button.textContent} selecionada`);
      });
    });

    document.getElementById('zoom').addEventListener('input', event => {
      const item = current();
      if (!item) return;
      item.zoom = Number(event.target.value) / 100;
      updatePreview();
    });

    document.getElementById('leftBtn').addEventListener('click', () => move(-12, 0));
    document.getElementById('rightBtn').addEventListener('click', () => move(12, 0));
    document.getElementById('upBtn').addEventListener('click', () => move(0, -12));
    document.getElementById('downBtn').addEventListener('click', () => move(0, 12));
    document.getElementById('resetBtn').addEventListener('click', resetCurrent);

    document.getElementById('downloadBtn').addEventListener('click', async () => {
      const item = current();
      if (!item) return toast('Escolha uma foto tirada ou salva no celular.');
      toast('Gerando foto...');
      await downloadItem(item, state.selected);
    });

    document.getElementById('downloadAllBtn').addEventListener('click', async () => {
      if (!state.photos.length) return toast('Escolha fotos tiradas ou salvas no celular.');
      toast('Gerando todas...');
      for (let i = 0; i < state.photos.length; i++) await downloadItem(state.photos[i], i);
    });

    updatePreview();
  </script>
</body>
</html>
